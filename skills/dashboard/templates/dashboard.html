<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
/* ============ tokens ============ */
:root{
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular","SF Mono","Cascadia Mono","Segoe UI Mono","Roboto Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --bg:#f7f5f0; --bg2:#efeae0; --fg:#1c1b19; --muted:#736e64; --muted2:#46423b;
  --card:#fffdf9; --line:#e6e1d5; --line2:#d8d2c4;
  --green:#1c7d4d; --green-bg:rgba(28,125,77,.10);
  --amber:#a9710c; --amber-bg:rgba(169,113,12,.13);
  --red:#bf3b2c;   --red-bg:rgba(191,59,44,.10);
  --accent:#3a6ea5;
  --shadow:0 1px 2px rgba(54,44,24,.05),0 10px 28px rgba(54,44,24,.07);
  --shadow-lg:0 6px 16px rgba(54,44,24,.10),0 24px 60px rgba(54,44,24,.16);
  --radius:16px;
}
[data-theme="dark"]{
  --bg:#15161a; --bg2:#1a1c21; --fg:#f3f1ea; --muted:#8c897f; --muted2:#c8c4ba;
  --card:#1f2126; --line:#2b2e35; --line2:#363a43;
  --green:#46c98a; --green-bg:rgba(70,201,138,.13);
  --amber:#e0a94a; --amber-bg:rgba(224,169,74,.15);
  --red:#ef6f63;   --red-bg:rgba(239,111,99,.13);
  --accent:#7eaee0;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 10px 30px rgba(0,0,0,.4);
  --shadow-lg:0 8px 24px rgba(0,0,0,.5),0 30px 70px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;color:var(--fg);font-family:var(--sans);font-size:16px;line-height:1.55;
  background:var(--bg);
  background-image:radial-gradient(120% 80% at 15% -20%,var(--bg2),transparent 55%);
  background-attachment:fixed;}
/* faint dot-grid for subtle texture (pure CSS, no external refs) */
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.4;
  background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:22px 22px}
.wrap{max-width:1080px;margin:0 auto;padding:40px 24px 56px}

/* ============ header ============ */
.kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin:0 0 14px}

/* ============ verdict hero ============ */
.verdict{display:flex;align-items:flex-start;gap:18px;padding:24px 26px;border-radius:var(--radius);
  background:var(--card);border:1px solid var(--line);border-left:6px solid var(--muted);
  box-shadow:var(--shadow);margin-bottom:26px;position:relative}
.verdict::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.6;
  background:radial-gradient(80% 140% at 0% 0%,var(--bg2),transparent 60%);border-radius:inherit}
.verdict.green{border-left-color:var(--green)} .verdict.yellow{border-left-color:var(--amber)}
.verdict.red{border-left-color:var(--red)} .verdict.na{border-left-color:var(--muted)}
.verdict>.dot{margin-top:9px}
.verdict-body{flex:1;min-width:0;position:relative}
.verdict-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.verdict h1{font-family:var(--serif);font-weight:600;font-size:27px;letter-spacing:-.01em;
  margin:0;line-height:1.2}
.status-word{margin-left:auto;font-size:11.5px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 10px;border-radius:999px}
.status-word.green{color:var(--green);background:var(--green-bg)}
.status-word.yellow{color:var(--amber);background:var(--amber-bg)}
.status-word.red{color:var(--red);background:var(--red-bg)}
.status-word.na{color:var(--muted);background:var(--bg2)}
.verdict .thresh{margin-top:8px;font-size:15px;color:var(--muted2);max-width:64ch}

/* ============ dots ============ */
.dot{width:14px;height:14px;border-radius:50%;flex:none;box-shadow:0 0 0 4px var(--bg2)}
.dot.green{background:var(--green)} .dot.yellow{background:var(--amber)}
.dot.red{background:var(--red)} .dot.na{background:var(--muted)}

/* ============ KPI strip ============ */
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
@media(max-width:720px){.strip{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--line2);
  border-radius:13px;padding:14px 15px 15px;box-shadow:var(--shadow);
  transition:transform .15s ease,box-shadow .15s ease}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.tile:hover,.tile:focus-within{position:relative;z-index:40} /* lift active tile so its tooltip wins paint order over later tiles */
.tile.green{border-top-color:var(--green);background:linear-gradient(var(--green-bg),transparent 60%),var(--card)}
.tile.yellow{border-top-color:var(--amber);background:linear-gradient(var(--amber-bg),transparent 60%),var(--card)}
.tile.red{border-top-color:var(--red);background:linear-gradient(var(--red-bg),transparent 60%),var(--card)}
.tile .label{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.tile .num{font-family:var(--mono);font-size:27px;font-weight:600;margin-top:7px;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.trend{font-family:var(--mono);font-size:12px;font-weight:600}
.trend.up{color:var(--green)} .trend.down{color:var(--red)} .trend.flat{color:var(--muted)}

/* ============ lenses ============ */
.lens{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.lens:hover,.lens:focus-within{position:relative;z-index:40} /* lift active section so its metric tooltip wins paint order over later sections (whose `animation:rise both` makes each its own stacking context) */
.lens summary{display:flex;align-items:center;gap:11px;cursor:pointer;list-style:none}
.lens summary::-webkit-details-marker{display:none}
.lens-title{font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:-.005em;
  display:inline-flex;align-items:center;gap:6px}
.badge{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 11px;border-radius:999px;border:1px solid transparent}
.badge.green{color:var(--green);background:var(--green-bg);border-color:var(--green-bg)}
.badge.yellow{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-bg)}
.badge.red{color:var(--red);background:var(--red-bg);border-color:var(--red-bg)}
.badge.na{color:var(--muted);background:var(--bg2)}
.lens summary::after{content:"›";color:var(--muted);font-size:22px;line-height:1;margin-left:4px;
  transform:rotate(90deg);transition:transform .2s ease}
.lens[open] summary::after{transform:rotate(-90deg)}
.lens .why{margin:14px 0 2px;color:var(--muted2);font-size:15px;max-width:74ch}
.lens .body{margin-top:16px;display:flex;flex-wrap:wrap;gap:12px 26px}
.lens .col{flex:1;min-width:225px;padding:12px 0 2px;border-top:1px solid var(--line)}
.lens .col>.label{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.named{font-size:14px;color:var(--muted2);margin:3px 0;line-height:1.45}
.col>.num{font-family:var(--mono);font-size:24px;font-weight:600;margin:2px 0 4px}
.thresh{font-size:12.5px;color:var(--muted)}

/* ============ charts ============ */
.chartwrap{margin:2px 0 6px}
.spark,.heat,.hbar,.trend-svg{color:var(--accent);display:block;max-width:100%}
svg.spark{height:42px}
.lens svg text{fill:var(--muted2);font-family:var(--sans)}
.axis{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
  color:var(--muted);margin-top:3px}

/* ============ tooltip ============ */
.tip{position:relative;display:inline-flex;vertical-align:middle;cursor:help;margin-left:1px;
  color:var(--muted);outline:none}
.tip:hover,.tip:focus-visible{color:var(--accent)}
.tip-i{display:block;opacity:.7;transition:opacity .15s ease}
.tip:hover .tip-i,.tip:focus .tip-i{opacity:1}
.tip-pop{position:absolute;top:calc(100% + 9px);left:0;z-index:30;width:max-content;max-width:300px;
  background:var(--card);color:var(--muted2);border:1px solid var(--line2);border-radius:12px;
  padding:13px 15px;box-shadow:var(--shadow-lg);font-family:var(--sans);font-size:13.5px;line-height:1.5;
  text-transform:none;letter-spacing:normal;font-weight:400;text-align:left;
  opacity:0;visibility:hidden;transform:translateY(-4px);
  transition:opacity .16s ease,transform .16s ease;pointer-events:none}
.tip:hover .tip-pop,.tip:focus .tip-pop,.tip:focus-within .tip-pop{opacity:1;visibility:visible;transform:none}
.tip.flip-x .tip-pop{left:auto;right:0}
.tip.flip-y .tip-pop{top:auto;bottom:calc(100% + 9px);transform:translateY(4px)}
.tip.flip-y:hover .tip-pop,.tip.flip-y:focus .tip-pop,.tip.flip-y:focus-within .tip-pop{transform:none}
.tip-h{display:block;font-family:var(--serif);font-weight:600;font-size:15px;color:var(--fg);
  margin-bottom:2px}
.tip-s{display:block;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--accent);margin:9px 0 2px}
.tip-pop .tip-s:nth-of-type(3){color:var(--muted)} /* the per-repo label gets a quieter tone */

/* ============ theme toggle ============ */
.toggle{position:fixed;top:16px;right:16px;z-index:50;background:var(--card);border:1px solid var(--line2);
  border-radius:999px;padding:7px 14px;cursor:pointer;color:var(--fg);font-family:var(--sans);
  font-size:13px;font-weight:600;box-shadow:var(--shadow);transition:transform .15s ease}
.toggle:hover{transform:translateY(-1px)}

/* ============ footer ============ */
footer{color:var(--muted);font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;
  margin-top:30px;text-align:center}

/* ============ motion ============ */
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.verdict,.strip .tile,.lens{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
.verdict{animation-delay:.02s}
.tile:nth-child(1){animation-delay:.08s}.tile:nth-child(2){animation-delay:.12s}
.tile:nth-child(3){animation-delay:.16s}.tile:nth-child(4){animation-delay:.20s}
.tile:nth-child(5){animation-delay:.24s}.tile:nth-child(6){animation-delay:.28s}
.tile:nth-child(7){animation-delay:.32s}.tile:nth-child(8){animation-delay:.36s}
.lens:nth-of-type(1){animation-delay:.40s}.lens:nth-of-type(2){animation-delay:.46s}
.lens:nth-of-type(3){animation-delay:.52s}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ print ============ */
@media print{
  body{background:#fff}body::before{display:none}.toggle,.tip{display:none!important}
  .lens[open] .body{display:flex}details{open:true}
  .verdict,.tile,.lens{box-shadow:none;animation:none}
}
</style>
</head>
<body>
<button class="toggle" onclick="(function(){var h=document.documentElement;
 h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';})()">◐ Theme</button>
<div class="wrap">
  <p class="kicker">{{GENERATED}}</p>
  <div class="verdict {{VERDICT_LIGHT}}">{{VERDICT}}</div>
  <div class="strip">{{KPI_STRIP}}</div>
  {{DELIVERY}}
  {{HEALTH}}
  {{TEAM}}
  <footer>{{FOOTER}}</footer>
</div>
<script>
/* Edge-aware tooltip positioning: flip the popover when it would clip. */
(function(){
  function place(e){
    var tip=e.target.closest&&e.target.closest('.tip');if(!tip)return;
    var pop=tip.querySelector('.tip-pop');if(!pop)return;
    tip.classList.remove('flip-x','flip-y');
    requestAnimationFrame(function(){
      var r=pop.getBoundingClientRect(),pad=10;
      if(r.right>window.innerWidth-pad)tip.classList.add('flip-x');
      if(r.bottom>window.innerHeight-pad)tip.classList.add('flip-y');
    });
  }
  document.addEventListener('pointerover',place,true);
  document.addEventListener('focusin',place,true);
})();
</script>
</body>
</html>
