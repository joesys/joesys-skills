<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
:root{--bg:#fbfbfd;--fg:#1d1d1f;--muted:#6e6e73;--card:#fff;--line:#e4e4e7;
 --green:#1a9e54;--yellow:#c98a00;--red:#d1342f;--accent:#0a84ff;}
[data-theme="dark"]{--bg:#161618;--fg:#f2f2f7;--muted:#9a9aa0;--card:#1f1f22;--line:#2c2c30;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);
 font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:1040px;margin:0 auto;padding:24px}
.verdict{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;
 background:var(--card);border:1px solid var(--line);margin-bottom:18px}
.dot{width:18px;height:18px;border-radius:50%;flex:none}
.dot.green{background:var(--green)}.dot.yellow{background:var(--yellow)}
.dot.red{background:var(--red)}.dot.na{background:var(--muted)}
.verdict h1{font-size:18px;margin:0}
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:680px){.strip{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}
.tile .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tile .num{font-size:20px;font-weight:650;margin-top:4px}
.lens{background:var(--card);border:1px solid var(--line);border-radius:14px;
 padding:16px 18px;margin-bottom:14px}
.lens summary{display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;
 font-size:16px;list-style:none}
.lens summary::-webkit-details-marker{display:none}
.lens .why{margin:12px 0 4px;color:var(--muted);font-size:14px}
.lens .body{margin-top:10px;display:flex;flex-wrap:wrap;gap:18px}
.lens .col{flex:1;min-width:220px}
.named{font-size:13px;color:var(--muted);margin:2px 0}
.thresh{font-size:12px;color:var(--muted)}
svg{color:var(--accent)}
.toggle{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--line);
 border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--fg);font-size:13px}
footer{color:var(--muted);font-size:12px;margin-top:24px;text-align:center}
@media print{.toggle{display:none}.lens[open] .body{display:flex}details{open:true}}
</style>
</head>
<body>
<button class="toggle" onclick="(function(){var h=document.documentElement;
 h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';})()">◐ theme</button>
<div class="wrap">
  <p class="thresh">{{GENERATED}}</p>
  <div class="verdict">{{VERDICT}}</div>
  <div class="strip">{{KPI_STRIP}}</div>
  {{DELIVERY}}
  {{HEALTH}}
  {{TEAM}}
  <footer>{{FOOTER}}</footer>
</div>
</body>
</html>
